<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #000;
            margin: 20px;
        }

        .receipt {
            width: 300px;
            background: #fff;
            margin: 0 auto;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .brand-name {
            font-size: 18px;
            font-weight: bold;
            display: block;
        }

        .divider {
            border-top: 1px dashed #000;
            margin: 8px 0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }

        .bold {
            font-weight: bold;
        }

        .total-section {
            font-size: 16px;
            margin-top: 5px;
            border-top: 1px solid #000;
            padding-top: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="header">
            <span class="brand-name">{{CenterName}}</span>
            DAILY MILK RECEIPT
        </div>

        <div class="divider"></div>

        <div class="row"><span>Rcpt No:</span><span class="bold">{{ReceiptNumber}}</span></div>
        <div class="row"><span>Date:</span><span>{{Date}}</span></div>
        <div class="row"><span>Shift:</span><span>{{Shift}}</span></div>

        <div class="divider"></div>

        <div class="row"><span>Farmer:</span><span class="bold">{{FarmerName}}</span></div>
        <div class="row"><span>Code:</span><span>#{{FarmerCode}}</span></div>

        <div class="divider"></div>

        <div class="row"><span>Milk Type:</span><span>{{MilkType}}</span></div>
        <div class="row"><span>Quantity:</span><span>{{Quantity}} Ltr</span></div>
        <div class="row"><span>FAT / CLR:</span><span>{{Fat}} / {{CLR}}</span></div>
        <div class="row"><span>Rate/Ltr:</span><span>₹{{Rate}}</span></div>

        <div class="total-section row bold">
            <span>TOTAL AMT:</span>
            <span>₹{{Amount}}</span>
        </div>

        <div class="divider"></div>

        <div class="footer">
            Thank You for your business!<br />
            Visit Again
        </div>
    </div>
</body>
</html>
